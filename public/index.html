<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comparador de Créditos</title>
  <!--Conexión con el archivo CSS-->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Comparador de créditos</h1>
    <nav>
     <!-- Botones de navegación para las secciones -->
      <button onclick="mostrarSeccion('comparador')">Comparador</button>
      <button onclick="mostrarSeccion('faq')">Preguntas Frecuentes</button>
      <button onclick="mostrarSeccion('glosario')">Glosario</button>
    </nav>
  </header>

  <main>
 <!--El ID de Comparador-->
    <section id="comparador">
      <h2>Ofertas de Créditos</h2>
<!-- Filtro en Pantalla-->
      <div class="filtros">
      <label for="filtroPlazo">Filtrar por Plazo</label>
      <select id="filtroPlazo">
        <option value="todos">Todos</option>
        <option value="6">6 meses</option>
        <option value="12">12 meses</option>
        <option value="24">24 meses</option>
        <option value="36">36 meses</option>
        <option value="48">48 meses</option>
      </select>

      <label for="FiltroMonto">Monto máximo</label>
      <input type="number" id="filtroMonto" placeholder="Ej: 600000" />

      <button onclick="aplicarFiltros()">Aplicar Filtros</button>
      <button id="btnLimpiar" type="button" onclick="limpiarFiltros()">Limpiar Filtros</button>
      </div>
            <!-- Mensaje -->
      <div id="mensaje" style="margin-top:10px; font-weight:bold; color:red;"></div>

      <!-- Contenedor de créditos -->
      <div id="listaCreditos"></div>

      

      <div class="table-container">
        <table id="tablaCreditos">
          <thead>
            <tr>
              <!-- Nombres de las columnas que se ve por pantalla-->
              <th>Banco</th>
              <th>CAE (%)</th>
              <th>Tasa (%)</th>
              <th>Plazo</th>
              <th>Monto Máximo</th>
              <th>Contacto</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
<!--El ID de Preguntas Frecuentes-->
    <section id="faq" style="display: none;">
      <h2>Preguntas Frecuentes</h2>
      <ul id="faqList"></ul>
    </section>
<!--El ID de Glosario-->
    <section id="glosario" style="display: none;">
      <h2>Glosario de Términos Financieros</h2>
      <dl id="glosarioList"></dl>
    </section>
  </main>

<!-- Pie de página con información de derechos de autor -->
  <footer>
    <p>&copy; 2025 Genesis. Todos los derechos Reservados</p>
  </footer>

  <!-- Conexión con el archivo JavaScript -->
  <script src="js/app.js"></script>
</body>
</html>
